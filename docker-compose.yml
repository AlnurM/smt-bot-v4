version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ctb
      POSTGRES_PASSWORD: ctb_password
      POSTGRES_DB: ctb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctb -d ctb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ctb:ctb_password@db:5432/ctb

volumes:
  postgres_data:
